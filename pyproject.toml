[project]
name = "smart-home-simulator"
version = "0.1.0"
description = "Constrained discrete-event smart-home simulator for synthetic ambient-sensor datasets"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
  "networkx>=3.4",
  "pydantic>=2.10",
  "simpy>=4.1",
  "typer>=0.15",
]

[project.scripts]
smart-home-sim = "smart_home_sim.cli:app"

[dependency-groups]
dev = [
  "pytest>=8.3",
  "ruff>=0.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/smart_home_sim"]

[tool.pytest.ini_options]
addopts = "-q"
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

